<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Agency — AI Prospecting Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Epilogue:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --white: #f7f5f0;
      --ink: #0d0d0d;
      --red: #c0392b;
      --border: #ddd9d3;
      --warm: #f0ebe3;
      --muted: #8a8580;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--white);
      color: var(--ink);
      font-family: 'Epilogue', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    .screen {
      display: none;
      min-height: 100vh;
    }

    .screen.active {
      display: block;
    }

    #app-screen.active {
      display: flex;
    }

    .sidebar {
      width: 248px;
      background: var(--white);
      border-right: 1px solid var(--border);
      position: fixed;
      height: 100vh;
    }

    .sidebar-logo {
      padding: 28px 24px;
      font-family: 'Clash Display', sans-serif;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo span {
      color: var(--red);
    }

    .sidebar-nav {
      padding: 8px 12px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
    }

    .nav-item.active {
      background: var(--warm);
      color: var(--ink);
      border-left: 2px solid var(--red);
    }

    .main {
      margin-left: 248px;
      flex: 1;
      padding: 44px 48px;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .cfg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .cfg-card {
      padding: 28px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .cfg-card-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .cfg-field {
      margin-bottom: 18px;
    }

    .cfg-field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .cfg-field input,
    .cfg-field select,
    .cfg-field textarea {
      width: 100%;
      padding: 11px;
      background: var(--warm);
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }

    .cfg-field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .skill-badge {
      background: var(--red);
      color: white;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 9px;
      vertical-align: middle;
      margin-left: 5px;
    }

    .btn-save {
      padding: 12px 28px;
      background: var(--ink);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: 0.2s;
    }

    .btn-save:hover {
      background: var(--red);
    }
  </style>
</head>

<body>
  <div id="app-screen" class="screen active">
    <div class="sidebar">
      <div class="sidebar-logo">CLAW <span>AGENCY</span></div>
      <nav class="sidebar-nav">
        <div class="nav-item active" onclick="openPanel('dashboard',this)">◈ Dashboard</div>
        <div class="nav-item" onclick="openPanel('leads',this)">◎ Leads</div>
        <div class="nav-item" onclick="openPanel('agent',this)">◉ Agent Config</div>
        <div class="nav-item" onclick="openPanel('pricing',this)">◇ Pricing</div>
      </nav>
    </div>
    <div class="main">
      <div id="panel-agent" class="panel active">
        <div class="cfg-grid">
          <div class="cfg-card">
            <div class="cfg-card-title">Targeting</div>
            <div class="cfg-field"><label>Target Sector</label><input type="text" id="cfg-sector"
                placeholder="e.g. Dental Clinics"></div>
            <div class="cfg-field"><label>Location</label><input type="text" id="cfg-location"
                placeholder="e.g. Luxembourg"></div>
          </div>
          <div class="cfg-card">
            <div class="cfg-card-title">Outreach Settings</div>
            <div class="cfg-field"><label>Language</label><select id="cfg-lang">
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="pt">Português</option>
              </select></div>
            <div class="cfg-field"><label>Reply-to Email</label><input type="email" id="cfg-reply"
                placeholder="bernardo@clawagency.online"></div>
          </div>
          <div class="cfg-card" style="grid-column: 1/-1">
            <div class="cfg-card-title">AI Adaptive Writing Skill <span class="skill-badge">ADVANCED</span></div>
            <div class="cfg-field">
              <label>Custom Instructions (The Agent's Brain)</label>
              <textarea id="cfg-instructions"
                placeholder="Example: Be professional but direct. Mention we are in Luxembourg. Focus on how our AI saves 10 hours of prospecting weekly..."></textarea>
            </div>
            <button class="btn-save" onclick="saveConfig()">Save & Sync Skill</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
        const API = 'https://claw-agency-production.up.railway.app';
        async function saveConfig() {
            const btn = event.target; btn.textContent = 'SYNCING...';
            const config = {
                sector: document.getElementById('cfg-sector').value,
                location: document.getElementById('cfg-location').value,
                language: document.getElementById('cfg-lang').value,
                reply_email: document.getElementById('cfg-reply').value,
                instructions: document.getElementById('cfg-instructions').value
            };
            try {
                const token = localStorage.getItem('claw_token');
                await fetch(`${API}/api/agent-config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(config)
                });
                alert('Skill Synced Successfully!');
            } catch (e) { alert('Sync Error'); }
            btn.textContent = 'SAVE & SYNC SKILL';
        }
        function openPanel(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('panel-' + name).classList.add('active');
            el.classList.add('active');
        }
  </script>
</body>

</html>
